id: transactions
name: Transactions
description: Personal transactions ledger
category: finance
icon: DollarSign
columns:
  - name: date
    displayName: Date
    dataType: date
  - name: merchant
    displayName: Merchant
    dataType: text
  - name: amount
    displayName: Amount
    dataType: number
  - name: category
    displayName: Category
    dataType: select
    config:
      options: [housing, food, transport, savings, discretionary, other]
  - name: account
    displayName: Account
    dataType: text
  - name: notes
    displayName: Notes
    dataType: text
  - name: is_recurring
    displayName: Recurring?
    dataType: boolean
  - name: month
    displayName: Month
    dataType: text
